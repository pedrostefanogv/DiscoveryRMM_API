name: Security Hotfix Fast-Track

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - beta
      - lts
      - release
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to process'
        required: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: security-hotfix-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-security-branch:
    runs-on: ubuntu-latest
    outputs:
      is_security: ${{ steps.check.outputs.is_security }}
      branch_name: ${{ steps.check.outputs.branch_name }}
    
    steps:
      - name: Check if branch is security/*
        id: check
        run: |
          if [[ "${{ github.head_ref }}" =~ ^security/ ]] || [[ "${{ github.head_ref }}" =~ ^hotfix/ ]]; then
            echo "is_security=true" >> "$GITHUB_OUTPUT"
            echo "branch_name=${{ github.head_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "is_security=false" >> "$GITHUB_OUTPUT"
          fi

  security-checks:
    needs: validate-security-branch
    if: needs.validate-security-branch.outputs.is_security == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Discovery.slnx

      - name: Build with analysis
        run: dotnet build Discovery.slnx --configuration Release --no-restore /p:TreatWarningsAsErrors=true

      - name: Run security tests
        run: dotnet test src/Discovery.Tests/Discovery.Tests.csproj --configuration Release --no-build --filter "Category=Security"
        continue-on-error: true

      - name: Run all tests
        run: dotnet test src/Discovery.Tests/Discovery.Tests.csproj --configuration Release --no-build

      - name: Security scan with git-secrets
        run: |
          # Check for common secrets patterns
          echo "Scanning for secrets..."
          if grep -r "password\|api[_-]key\|secret\|token" --include="*.cs" --include="*.json" src/ | grep -v "configuration\|appsettings" | grep -i "=.*['\"]"; then
            echo "⚠️ Potential secrets found. Review before merge."
          else
            echo "✅ No obvious secrets detected"
          fi

      - name: Add security review label
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['🔴 security-hotfix', 'fast-track']
            })

      - name: Comment on PR - Fast Track Status
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ needs.validate-security-branch.outputs.branch_name }}';
            const comment = `
            🔴 **SECURITY HOTFIX DETECTED**
            
            Branch: \`${branch}\`
            
            ⚡ **Fast-Track Processing:**
            - ✅ Full test suite passed
            - ✅ Security validation completed
            - 🚀 Ready for immediate merge to: \`release\` → \`lts\` → \`beta\` → \`dev\`
            
            **Merge Strategy:**
            1. Merge to \`release\` (primary channel)
            2. Auto-sync to \`lts\` (Long-Term Support)
            3. Auto-sync to \`beta\` (Test channel)
            4. Auto-sync to \`dev\` (Development)
            
            ⚠️ **This PR bypasses normal review queue. Requires 2 maintainer approvals.**
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            })

  auto-sync-to-branches:
    needs: [validate-security-branch, security-checks]
    if: |
      needs.validate-security-branch.outputs.is_security == 'true' && 
      github.event.action == 'closed' && 
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target-branch: [lts, beta, dev]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR head SHA
        id: pr_sha
        run: |
          echo "sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"

      - name: Sync to ${{ matrix.target-branch }}
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          
          # Fetch all branches
          git fetch origin ${{ matrix.target-branch }} --depth=1
          git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1
          
          # Checkout target branch
          git checkout origin/${{ matrix.target-branch }} -b sync-${{ matrix.target-branch }}
          
          # Cherry-pick or merge the security fix
          git cherry-pick ${{ steps.pr_sha.outputs.sha }} || git merge --allow-unrelated-histories -m "chore: sync security hotfix from ${{ github.event.pull_request.base.ref }}" origin/${{ github.event.pull_request.base.ref }}
          
          # Push to target branch
          git push origin HEAD:${{ matrix.target-branch }}

      - name: Create sync PR if cherry-pick failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `chore: sync security hotfix to ${{ matrix.target-branch }}`,
              head: `sync-security-${{ matrix.target-branch }}-${{ github.run_id }}`,
              base: `${{ matrix.target-branch }}`,
              body: `
                🔴 **Security hotfix sync from:** \`${{ github.event.pull_request.base.ref }}\`
                
                This PR automatically syncs the security fix to \`${{ matrix.target-branch }}\`.
                
                **Original PR:** #${{ github.event.pull_request.number }}
                **Commit:** ${{ steps.pr_sha.outputs.sha }}
              `
            })

  notify-security-team:
    needs: validate-security-branch
    if: needs.validate-security-branch.outputs.is_security == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Slack notification (if configured)
        run: |
          echo "🔴 Security hotfix detected: ${{ needs.validate-security-branch.outputs.branch_name }}"
          echo "PR: ${{ github.event.pull_request.html_url }}"
          # Uncomment to add Slack integration:
          # Add a SLACK_WEBHOOK repository secret and call curl with it here.
